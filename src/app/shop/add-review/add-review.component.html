<div class="add-review-form mt-3 p-3 border rounded">
    <h5>Write a Review</h5>
    <div class="mb-2">
        <input type="email"
               class="form-control form-control-sm"
               placeholder="Email (optional)"
               [(ngModel)]="form.reviewer_email">
    </div>
    <div class="mb-2">
        <textarea class="form-control form-control-sm"
                  rows="3"
                  maxlength="2000"
                  placeholder="Your review..."
                  [(ngModel)]="form.comment_text"></textarea>
    </div>
    <button class="btn btn-primary btn-sm"
            [disabled]="isSubmitting || !(form.comment_text || '').trim()"
            (click)="submit()">
        {{ isSubmitting ? 'Submitting...' : 'Submit' }}
    </button>
</div>
